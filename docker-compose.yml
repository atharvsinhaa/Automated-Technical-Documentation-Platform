version: '3.8'

services:
  backend:
    build: ./ai-doc-system
    ports:
      - "8000:8000"
    env_file:
      - ./ai-doc-system/.env
    environment:
      # Override the host when running in Compose to point to the ollama service
      - OLLAMA_HOST=http://ollama:11434
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - ollama
      - mongo

  frontend:
    build: ./frontend-angular-ui
    ports:
      - "4200:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: always

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: always

volumes:
  ollama_data:
  mongo_data:
